<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
   <header>
        <h1>Cadastri-se Aqui!</h1>
    </header>
    <main>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required
            oninvalid="this.setCustomValidity('Por favor, preencha o nome.')"
            oninput="this.setCustomValidity('')">

            
            
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required 
            oninvalid="this.setCustomValidity('Por favor, preencha o email.')"
            oninput="this.setCustomValidity('')"><br><br>

            <label for="number"> Idade:</label>
            <input type="number" id="number" name="idade" min="18" max="60" required><br><br>
        

            <label for="senha">Senha:</label>
            <input type="password" id="inSenha" name="senha" required 
            oninvalid="this.setCustomValidity('Por favor, preencha a senha.')"
            oninput="this.setCustomValidity('')"><br><br>

            <label for="cep">CEP:</label>
            <input type="number" id="inCep" name="cep" required pattern="[0-9]{5}-[0-9]{3}" 
            oninvalid="this.setCustomValidity('Por favor, preencha o CEP no formato correto (XXXXX-XXX).')"
            oninput="this.setCustomValidity('')"><br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required 
            oninvalid="this.setCustomValidity('Por favor, preencha o telefone.')"
            oninput="this.setCustomValidity('')"><br><br>

            <button type="submit">Cadastrar</button>













    
</body>
</html>
